<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: rgba(255,255,255,0.04);
    --surface-solid: #171627;
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.12);
    --text: #eeeef0;
    --text-muted: #7f7f9a;
    --accent: #a78bfa;
    --accent-dim: rgba(167, 139, 250, 0.15);
    --accent-glow: rgba(167, 139, 250, 0.3);
    --active: #4ade80;
    --active-dim: rgba(74, 222, 128, 0.15);
    --inactive: #6b7280;
    --inactive-dim: rgba(107, 114, 128, 0.18);
    --danger: #f87171;
    --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  body::before {
    content:''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 120% 60% at 20% 0%, rgba(45, 27, 80, 0.7) 0%, transparent 60%),
      radial-gradient(ellipse 100% 50% at 80% 10%, rgba(20, 60, 90, 0.6) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(100, 60, 130, 0.2) 0%, transparent 50%);
  }
  .app { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; padding: 0 16px 80px; }

  .topbar {
    position: sticky; top: 0; z-index: 10;
    padding: 14px 0 10px;
    background: linear-gradient(180deg, var(--bg) 60%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .tabs {
    display: flex; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }
  .tab {
    flex: 1; text-align: center;
    padding: 9px 12px;
    font-size: 14px; font-weight: 600;
    color: var(--text-muted);
    text-decoration: none;
    border-radius: 9px;
    transition: all .18s ease;
  }
  .tab.active {
    background: var(--accent-dim);
    color: var(--text);
    box-shadow: 0 0 0 1px var(--accent-glow) inset;
  }

  .title {
    font-size: 26px; font-weight: 700;
    margin: 18px 0 14px;
    letter-spacing: -0.02em;
  }
  .title .accent { color: var(--accent); }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search {
    width: 100%;
    padding: 13px 16px 13px 42px;
    font-family: inherit; font-size: 15px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .search:focus { border-color: var(--border-light); }
  .search::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px; opacity: .55;
    pointer-events: none;
  }

  .chips { display: flex; gap: 8px; margin-bottom: 14px; }
  .chip {
    flex: 1;
    padding: 9px 8px;
    font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s ease;
    text-align: center;
    font-family: inherit;
  }
  .chip.on {
    background: var(--accent-dim);
    color: var(--text);
    border-color: var(--accent-glow);
  }
  .chip .count {
    display: inline-block;
    margin-left: 4px;
    opacity: .7;
    font-weight: 500;
  }

  .counter {
    font-size: 12px;
    color: var(--text-muted);
    margin: 0 4px 10px;
  }

  .list { display: flex; flex-direction: column; gap: 8px; }
  .card {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .15s ease;
    -webkit-user-select: none; user-select: none;
  }
  .card:active { transform: scale(0.985); background: var(--surface-hover); }
  .card-info { min-width: 0; flex: 1; }
  .card-name {
    font-size: 16px; font-weight: 600;
    line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-handle {
    font-size: 12.5px;
    color: var(--text-muted);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 11px;
    font-size: 12px; font-weight: 600;
    border-radius: 999px;
    flex-shrink: 0;
    transition: all .15s ease;
  }
  .badge .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    opacity: .85;
  }
  .badge.active { background: var(--active-dim); color: var(--active); }
  .badge.inactive { background: var(--inactive-dim); color: #9aa1ad; }

  .tt-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    flex-shrink: 0;
    text-decoration: none;
    transition: all .15s ease;
  }
  .tt-btn:active { transform: scale(0.92); background: var(--surface-hover); }
  .tt-btn svg { width: 17px; height: 17px; display: block; }

  .empty, .loading, .error {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .error { color: var(--danger); }
  .retry-btn {
    display: inline-block;
    margin-top: 12px;
    padding: 8px 16px;
    background: var(--accent-dim);
    color: var(--text);
    border: 1px solid var(--accent-glow);
    border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }

  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .sheet {
    width: 100%; max-width: 540px;
    background: var(--surface-solid);
    border-top-left-radius: 22px;
    border-top-right-radius: 22px;
    border-top: 1px solid var(--border-light);
    padding: 22px 22px max(22px, env(safe-area-inset-bottom));
    transform: translateY(100%);
    animation: slideUp .25s cubic-bezier(0.2,0.9,0.3,1) forwards;
  }
  @keyframes slideUp { to { transform: translateY(0); } }
  .sheet-grip {
    width: 38px; height: 4px;
    background: var(--border-light);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .sheet-body {
    font-size: 14.5px; color: var(--text-muted);
    line-height: 1.45; margin-bottom: 20px;
  }
  .sheet-body strong { color: var(--text); font-weight: 600; }
  .sheet-arrow { display: block; margin-top: 6px; font-weight: 500; color: var(--text); }
  .sheet-actions { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 13px 16px;
    font-family: inherit; font-size: 15px; font-weight: 600;
    border: 1px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .btn-cancel {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text);
  }
  .btn-confirm {
    background: var(--accent);
    color: #1a1040;
  }
  .btn-confirm.danger { background: var(--danger); color: #fff; }
  .btn:active { transform: scale(0.97); }

  .toast {
    position: fixed; left: 50%; bottom: 32px;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface-solid);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 13.5px; font-weight: 500;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
    z-index: 200;
    opacity: 0;
    transition: opacity .2s, transform .25s;
    pointer-events: none;
    max-width: 80%;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  .toast.error { border-color: rgba(248, 113, 113, .4); }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <nav class="tabs">
        <a class="tab" href="index.html">Creator Hub</a>
        <a class="tab active" href="tracking.html">Tracking</a>
      </nav>
    </div>

    <h1 class="title">Tracking<span class="accent">.</span></h1>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
      <input id="searchInput" class="search" type="search" placeholder="Suchen..." autocomplete="off">
    </div>

    <div class="chips">
      <button class="chip on" data-filter="all">Alle <span class="count" id="cntAll"></span></button>
      <button class="chip" data-filter="active">Aktiv <span class="count" id="cntActive"></span></button>
      <button class="chip" data-filter="inactive">Inaktiv <span class="count" id="cntInactive"></span></button>
    </div>

    <div class="counter" id="counter">Lade...</div>

    <div id="list" class="list"></div>
  </div>

  <div id="confirmOverlay" class="overlay" role="dialog" aria-modal="true">
    <div class="sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-title" id="confirmTitle">Status andern?</div>
      <div class="sheet-body" id="confirmBody"></div>
      <div class="sheet-actions">
        <button class="btn btn-cancel" id="confirmCancel">Abbrechen</button>
        <button class="btn btn-confirm" id="confirmPrimary">Bestatigen</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
const LIST_API   = 'https://primary-production-fd8f.up.railway.app/webhook/tracking/list';
const STATUS_API = 'https://primary-production-fd8f.up.railway.app/webhook/tracking/status';
const TRACKING_TOKEN = '79726f4741d46499cea6ec5ca44f373332ebecc6a286bbae';

let allCreators = [];
let activeFilter = 'all';
let searchTerm = '';

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type==='error' ? ' error' : '');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(function(){ t.className = 'toast'; }, 2400);
}

function buildCard(creator, idx) {
  var card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('data-idx', String(idx));

  var info = document.createElement('div');
  info.className = 'card-info';

  var nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = creator.name || '';
  info.appendChild(nameEl);

  if (creator.tiktokHandle) {
    var handleEl = document.createElement('div');
    handleEl.className = 'card-handle';
    handleEl.textContent = '@' + creator.tiktokHandle;
    info.appendChild(handleEl);
  }
  card.appendChild(info);

  if (creator.tiktokUrl) {
    var ttBtn = document.createElement('a');
    ttBtn.className = 'tt-btn';
    ttBtn.href = creator.tiktokUrl;
    ttBtn.target = '_blank';
    ttBtn.rel = 'noopener noreferrer';
    ttBtn.setAttribute('aria-label', 'TikTok-Profil oeffnen');
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'currentColor');
    svg.setAttribute('aria-hidden', 'true');
    var path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', 'M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43V8.66a8.16 8.16 0 0 0 4.77 1.52V6.73a4.85 4.85 0 0 1-1.84-.04z');
    svg.appendChild(path);
    ttBtn.appendChild(svg);
    ttBtn.addEventListener('click', function(e){ e.stopPropagation(); });
    card.appendChild(ttBtn);
  }

  var badge = document.createElement('span');
  badge.className = 'badge ' + (creator.status === 'active' ? 'active' : 'inactive');
  var dot = document.createElement('span');
  dot.className = 'dot';
  badge.appendChild(dot);
  badge.appendChild(document.createTextNode(creator.status === 'active' ? 'aktiv' : 'inaktiv'));
  card.appendChild(badge);

  card.addEventListener('click', onCardTap);
  return card;
}

function clearChildren(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function fetchList() {
  var listEl = document.getElementById('list');
  var counter = document.getElementById('counter');
  counter.textContent = 'Lade...';
  clearChildren(listEl);

  return fetch(LIST_API, {
    method: 'GET', mode: 'cors', credentials: 'omit', cache: 'no-cache',
    headers: { 'X-Tracking-Token': TRACKING_TOKEN }
  })
  .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(function(d){
    allCreators = (d && d.creators) ? d.creators : [];
    render();
  })
  .catch(function(){
    clearChildren(listEl);
    var box = document.createElement('div');
    box.className = 'error';
    box.appendChild(document.createTextNode('Konnte nicht laden.'));
    box.appendChild(document.createElement('br'));
    var btn = document.createElement('button');
    btn.className = 'retry-btn';
    btn.textContent = 'Erneut versuchen';
    btn.addEventListener('click', fetchList);
    box.appendChild(btn);
    listEl.appendChild(box);
    counter.textContent = '';
  });
}

function render() {
  var list = document.getElementById('list');
  var counter = document.getElementById('counter');

  var totals = { all: allCreators.length, active: 0, inactive: 0 };
  for (var i = 0; i < allCreators.length; i++) {
    if (allCreators[i].status === 'active') totals.active++;
    else totals.inactive++;
  }
  document.getElementById('cntAll').textContent = String(totals.all);
  document.getElementById('cntActive').textContent = String(totals.active);
  document.getElementById('cntInactive').textContent = String(totals.inactive);

  var s = searchTerm.trim().toLowerCase();
  var filtered = [];
  for (var j = 0; j < allCreators.length; j++) {
    var c = allCreators[j];
    if (activeFilter !== 'all' && c.status !== activeFilter) continue;
    if (s) {
      var hay = ((c.name || '') + ' ' + (c.tiktokHandle || '')).toLowerCase();
      if (hay.indexOf(s) === -1) continue;
    }
    filtered.push({ creator: c, idx: j });
  }

  counter.textContent = filtered.length + ' von ' + allCreators.length + ' Creator';

  clearChildren(list);

  if (filtered.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'Keine Treffer.';
    list.appendChild(empty);
    return;
  }

  for (var k = 0; k < filtered.length; k++) {
    list.appendChild(buildCard(filtered[k].creator, filtered[k].idx));
  }
}

function onCardTap() {
  var idx = parseInt(this.getAttribute('data-idx'), 10);
  var c = allCreators[idx];
  if (!c) return;
  var newStatus = c.status === 'active' ? 'inactive' : 'active';
  showConfirm(c, newStatus, idx);
}

function showConfirm(creator, newStatus, idx) {
  var overlay = document.getElementById('confirmOverlay');
  var title = document.getElementById('confirmTitle');
  var body = document.getElementById('confirmBody');
  var btnPrimary = document.getElementById('confirmPrimary');
  var btnCancel = document.getElementById('confirmCancel');

  title.textContent = newStatus === 'active' ? 'Auf aktiv setzen?' : 'Auf inaktiv setzen?';

  clearChildren(body);
  var nameStrong = document.createElement('strong');
  nameStrong.textContent = creator.name || '';
  body.appendChild(nameStrong);
  var arrow = document.createElement('span');
  arrow.className = 'sheet-arrow';
  arrow.textContent = (creator.status === 'active' ? 'aktiv' : 'inaktiv') +
    ' -> ' + (newStatus === 'active' ? 'aktiv' : 'inaktiv');
  body.appendChild(arrow);

  btnPrimary.textContent = 'Bestatigen';
  if (newStatus === 'inactive') btnPrimary.classList.add('danger');
  else btnPrimary.classList.remove('danger');

  overlay.classList.add('open');

  function cleanup() {
    overlay.classList.remove('open');
    btnPrimary.removeEventListener('click', onOk);
    btnCancel.removeEventListener('click', onCancel);
    overlay.removeEventListener('click', onOverlayClick);
  }
  function onOverlayClick(e) { if (e.target === overlay) { cleanup(); } }
  function onCancel() { cleanup(); }
  function onOk() { cleanup(); toggleStatus(creator, newStatus, idx); }
  btnPrimary.addEventListener('click', onOk);
  btnCancel.addEventListener('click', onCancel);
  overlay.addEventListener('click', onOverlayClick);
}

function toggleStatus(creator, newStatus, idx) {
  var prev = creator.status;
  allCreators[idx].status = newStatus;
  render();

  var body = JSON.stringify({
    name: String(creator.name || ''),
    tiktokLink: String(creator.tiktokLink || ''),
    newStatus: newStatus
  });

  fetch(STATUS_API, {
    method: 'POST', mode: 'cors', credentials: 'omit', cache: 'no-cache',
    headers: { 'Content-Type': 'application/json', 'X-Tracking-Token': TRACKING_TOKEN },
    body: body
  })
  .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return true; })
  .then(function(){
    showToast(creator.name + ' -> ' + (newStatus === 'active' ? 'aktiv' : 'inaktiv'));
  })
  .catch(function(err){
    allCreators[idx].status = prev;
    render();
    showToast('Fehler: ' + (err.message || 'unbekannt'), 'error');
  });
}

document.getElementById('searchInput').addEventListener('input', function(e){
  searchTerm = e.target.value;
  render();
});
var chipBtns = document.querySelectorAll('.chip');
for (var m = 0; m < chipBtns.length; m++) {
  chipBtns[m].addEventListener('click', function(){
    activeFilter = this.getAttribute('data-filter');
    for (var n = 0; n < chipBtns.length; n++) chipBtns[n].classList.remove('on');
    this.classList.add('on');
    render();
  });
}

var startY = null;
window.addEventListener('touchstart', function(e){
  if (window.scrollY <= 0) startY = e.touches[0].clientY;
});
window.addEventListener('touchmove', function(e){
  if (startY === null) return;
  var dy = e.touches[0].clientY - startY;
  if (dy > 80) { startY = null; fetchList(); }
});
window.addEventListener('touchend', function(){ startY = null; });

fetchList();
</script>
</body>
</html>
