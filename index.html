<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Creator Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: rgba(255,255,255,0.04);
    --surface-solid: #171627;
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.12);
    --text: #eeeef0;
    --text-muted: #7f7f9a;
    --accent: #a78bfa;
    --accent-dim: rgba(167, 139, 250, 0.15);
    --accent-glow: rgba(167, 139, 250, 0.3);
    --creator: #a78bfa;
    --testphase: #f0a674;
    --whatsapp: #25D366;
    --tiktok: #ff004f;
    --instagram: #e1306c;
    --youtube: #ff0000;
    --pinterest: #e60023;
    --snapchat: #fffc00;
    --radius: 20px;
    --radius-sm: 12px;
    --grad-1: #1a1040;
    --grad-2: #0d2137;
    --grad-3: #2d1b3d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  /* === ATMOSPHERIC BACKGROUND === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 20% 0%, rgba(45, 27, 80, 0.7) 0%, transparent 60%),
      radial-gradient(ellipse 100% 50% at 80% 10%, rgba(20, 60, 90, 0.6) 0%, transparent 50%),
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(180, 100, 120, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(100, 60, 130, 0.2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1.5px 1.5px at 45% 8%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 60% 42%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 75% 20%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 85% 55%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 35% 80%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1.5px 1.5px at 90% 75%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 70% 85%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 42% 30%, rgba(167,139,250,0.4), transparent),
      radial-gradient(1px 1px at 68% 12%, rgba(167,139,250,0.3), transparent);
    pointer-events: none;
    z-index: 0;
    animation: starDrift 40s linear infinite;
  }

  @keyframes starDrift {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* === HEADER === */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15, 14, 23, 0.75);
    backdrop-filter: blur(30px) saturate(1.6);
    -webkit-backdrop-filter: blur(30px) saturate(1.6);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    font-style: italic;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo span {
    background: linear-gradient(135deg, #a78bfa, #c084fc, #e879a8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .counter {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 100px;
    backdrop-filter: blur(10px);
  }

  .counter b {
    background: linear-gradient(135deg, #a78bfa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
  }

  /* === SEARCH === */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    opacity: 0.6;
  }

  .search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px 14px 46px;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: all 0.3s ease;
  }

  .search::placeholder { color: var(--text-muted); font-weight: 300; }
  .search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px var(--accent-dim);
    background: rgba(255,255,255,0.06);
  }

  /* === FILTERS === */
  .filters {
    display: flex;
    gap: 8px;
    padding-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .filter-btn:active { transform: scale(0.95); }

  .filter-btn.active {
    background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(192,132,252,0.15));
    color: #c4b5fd;
    border-color: rgba(167,139,250,0.35);
    box-shadow: 0 0 16px rgba(167,139,250,0.1);
    font-weight: 600;
  }

  .filter-btn .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
  }

  .filter-btn .dot.creator-dot { background: var(--creator); }
  .filter-btn .dot.testphase-dot { background: var(--testphase); }

  /* === LIST === */
  .list {
    padding: 12px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  /* === CARD === */
  .card {
    background: rgba(22, 21, 40, 0.65);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    transition: all 0.2s ease;
    animation: cardIn 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(167,139,250,0.2), transparent);
  }

  .card:active {
    transform: scale(0.985);
    background: rgba(22, 21, 40, 0.8);
    border-color: rgba(167,139,250,0.2);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .avatar {
    width: 46px;
    height: 46px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
    color: #fff;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
  }

  .avatar.testphase {
    background: linear-gradient(135deg, #d97706, #f0a674);
    box-shadow: 0 4px 12px rgba(217, 119, 6, 0.25);
  }

  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
    letter-spacing: 0.01em;
  }

  .card-handle {
    font-size: 12.5px;
    font-weight: 400;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status-badge {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 5px 10px;
    border-radius: 100px;
    border: 1px solid transparent;
  }

  .status-badge.creator {
    background: rgba(167, 139, 250, 0.12);
    color: #c4b5fd;
    border-color: rgba(167, 139, 250, 0.2);
  }

  .status-badge.testphase {
    background: rgba(240, 166, 116, 0.12);
    color: var(--testphase);
    border-color: rgba(240, 166, 116, 0.2);
  }

  /* === ACTIONS === */
  .actions { display: flex; gap: 8px; }

  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 11px 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
    color: var(--text-muted);
    background: rgba(255,255,255,0.03);
  }

  .action-btn:active { transform: scale(0.95); }

  .action-btn.whatsapp {
    background: rgba(37, 211, 102, 0.08);
    border-color: rgba(37, 211, 102, 0.2);
    color: #4ade80;
    flex: 1.3;
  }

  .action-btn.whatsapp:active {
    background: rgba(37, 211, 102, 0.15);
    box-shadow: 0 0 16px rgba(37, 211, 102, 0.15);
  }

  .action-btn.disabled { opacity: 0.25; pointer-events: none; }
  .action-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .social-links { display: flex; gap: 6px; }

  .social-link {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    transition: all 0.2s ease;
  }

  .social-link:active { transform: scale(0.9); }
  .social-link svg { width: 17px; height: 17px; }

  .social-link.tiktok { color: #ff6b9d; border-color: rgba(255,107,157,0.2); }
  .social-link.tiktok:active { background: rgba(255,107,157,0.1); box-shadow: 0 0 12px rgba(255,107,157,0.15); }
  .social-link.instagram { color: #e879a8; border-color: rgba(232,121,168,0.2); }
  .social-link.instagram:active { background: rgba(232,121,168,0.1); box-shadow: 0 0 12px rgba(232,121,168,0.15); }
  .social-link.youtube { color: #f87171; border-color: rgba(248,113,113,0.2); }
  .social-link.youtube:active { background: rgba(248,113,113,0.1); }
  .social-link.pinterest { color: #fb7185; border-color: rgba(251,113,133,0.2); }
  .social-link.pinterest:active { background: rgba(251,113,133,0.1); }
  .social-link.snapchat { color: #fde047; border-color: rgba(253,224,71,0.2); }
  .social-link.snapchat:active { background: rgba(253,224,71,0.08); }

  /* === STATES === */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
  .empty-text { font-size: 15px; line-height: 1.5; font-weight: 300; }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2.5px solid rgba(167,139,250,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 13px; font-weight: 300; }

  /* === SCROLL TOP === */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(124, 58, 237, 0.35);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 50;
  }

  .scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .scroll-top:active { transform: scale(0.9); }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">Creator<span>Hub</span></div>
    <div class="counter" id="counter">...</div>
  </div>
  <div class="search-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="search" type="search" id="search" placeholder="Creator suchen..." autocomplete="off">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="creator"><span class="dot creator-dot"></span>Creator</button>
    <button class="filter-btn" data-filter="testphase"><span class="dot testphase-dot"></span>Testphase</button>
  </div>
</header>

<main class="list" id="list"></main>

<button class="scroll-top" id="scrollTop">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<script>
const API = 'https://primary-production-fd8f.up.railway.app/webhook/creators';
let allCreators = [];
let activeFilter = 'all';

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'class') node.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
      else if (k.startsWith('data-')) node.setAttribute(k, v);
      else node[k] = v;
    });
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (!c) return;
      if (typeof c === 'string') node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    });
  }
  return node;
}

function svgIcon(svgMarkup) {
  const t = document.createElement('template');
  t.innerHTML = svgMarkup.trim();
  return t.content.firstChild;
}

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
}

function buildCard(c, i) {
  const card = el('div', { class: 'card', 'data-status': c.status });
  card.style.animationDelay = (i * 0.04) + 's';

  const avatar = el('div', { class: 'avatar' + (c.status === 'testphase' ? ' testphase' : '') }, getInitials(c.name));
  const nameEl = el('div', { class: 'card-name' }, c.name);
  const handleEl = el('div', { class: 'card-handle' }, '@' + c.handle);
  const info = el('div', { class: 'card-info' }, [nameEl, handleEl]);
  const badge = el('span', { class: 'status-badge ' + c.status }, c.status === 'testphase' ? 'Test' : 'Active');
  const top = el('div', { class: 'card-top' }, [avatar, info, badge]);

  const actions = el('div', { class: 'actions' });

  if (c.phone) {
    const waBtn = el('a', { href: 'https://wa.me/' + c.phone, target: '_blank', class: 'action-btn whatsapp' }, [SVG.whatsapp(), document.createTextNode('WhatsApp')]);
    actions.appendChild(waBtn);
  } else {
    const noPhone = el('span', { class: 'action-btn disabled' }, [SVG.phone(), document.createTextNode('Keine Nr.')]);
    actions.appendChild(noPhone);
  }

  const socials = el('div', { class: 'social-links' });
  if (c.tiktok) {
    socials.appendChild(el('a', { href: c.tiktok, target: '_blank', class: 'social-link tiktok' }, [SVG.tiktok()]));
  }
  if (c.secType && c.secUrl && SVG[c.secType]) {
    socials.appendChild(el('a', { href: c.secUrl, target: '_blank', class: 'social-link ' + c.secType }, [SVG[c.secType]()]));
  }

  actions.appendChild(socials);
  card.appendChild(top);
  card.appendChild(actions);
  return card;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = allCreators;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(c => c.status === activeFilter);
  }
  if (q) {
    filtered = filtered.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.handle.toLowerCase().includes(q)
    );
  }

  const list = document.getElementById('list');
  list.textContent = '';

  if (filtered.length === 0) {
    list.appendChild(el('div', { class: 'empty' }, [
      el('div', { class: 'empty-icon' }, ':/'),
      el('div', { class: 'empty-text' }, 'Keine Creator gefunden')
    ]));
  } else {
    filtered.forEach((c, i) => list.appendChild(buildCard(c, i)));
  }

  const total = allCreators.length;
  const shown = filtered.length;
  const counter = document.getElementById('counter');
  counter.textContent = '';
  const b = el('b', {}, String(shown === total ? total : shown));
  counter.appendChild(b);
  counter.appendChild(document.createTextNode(shown === total ? ' Creator' : ' / ' + total));
}

(function showLoading() {
  document.getElementById('list').appendChild(
    el('div', { class: 'loading' }, [
      el('div', { class: 'spinner' }),
      el('div', { class: 'loading-text' }, 'Creator laden...')
    ])
  );
})();

document.getElementById('filters').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  render();
});

var searchTimer;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 150);
});

document.getElementById('scrollTop').addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

window.addEventListener('scroll', function() {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

fetch(API)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    allCreators = data.creators || [];
    allCreators.sort(function(a, b) { return a.name.localeCompare(b.name, 'de'); });
    render();
  })
  .catch(function() {
    var list = document.getElementById('list');
    list.textContent = '';
    list.appendChild(el('div', { class: 'empty' }, [
      el('div', { class: 'empty-icon' }, '!'),
      el('div', { class: 'empty-text' }, 'Fehler beim Laden. Bitte Seite neu laden.')
    ]));
  });
</script>
