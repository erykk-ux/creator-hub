<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Creator Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: rgba(255,255,255,0.04);
    --surface-solid: #171627;
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.12);
    --text: #eeeef0;
    --text-muted: #7f7f9a;
    --accent: #a78bfa;
    --accent-dim: rgba(167, 139, 250, 0.15);
    --accent-glow: rgba(167, 139, 250, 0.3);
    --creator: #a78bfa;
    --testphase: #f0a674;
    --whatsapp: #25D366;
    --tiktok: #ff004f;
    --instagram: #e1306c;
    --youtube: #ff0000;
    --pinterest: #e60023;
    --snapchat: #fffc00;
    --radius: 20px;
    --radius-sm: 12px;
    --grad-1: #1a1040;
    --grad-2: #0d2137;
    --grad-3: #2d1b3d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  /* === ATMOSPHERIC BACKGROUND === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 20% 0%, rgba(45, 27, 80, 0.7) 0%, transparent 60%),
      radial-gradient(ellipse 100% 50% at 80% 10%, rgba(20, 60, 90, 0.6) 0%, transparent 50%),
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(180, 100, 120, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(100, 60, 130, 0.2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1.5px 1.5px at 45% 8%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 60% 42%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 75% 20%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 85% 55%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 35% 80%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1.5px 1.5px at 90% 75%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 70% 85%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 42% 30%, rgba(167,139,250,0.4), transparent),
      radial-gradient(1px 1px at 68% 12%, rgba(167,139,250,0.3), transparent);
    pointer-events: none;
    z-index: 0;
    animation: starDrift 40s linear infinite;
  }

  @keyframes starDrift {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* === HEADER === */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15, 14, 23, 0.75);
    backdrop-filter: blur(30px) saturate(1.6);
    -webkit-backdrop-filter: blur(30px) saturate(1.6);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 0;
    transition: transform 0.3s ease;
  }

  .header.hidden { transform: translateY(-100%); }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    font-style: italic;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo span {
    background: linear-gradient(135deg, #a78bfa, #c084fc, #e879a8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .counter {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 100px;
    backdrop-filter: blur(10px);
  }

  .counter b {
    background: linear-gradient(135deg, #a78bfa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .burger-btn {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
    padding: 0;
    transition: border-color 0.2s ease, background 0.2s ease;
    flex-shrink: 0;
  }
  .burger-btn:active { transform: scale(0.93); }
  .burger-btn span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: transform 0.25s ease, opacity 0.25s ease;
  }
  .burger-btn.open {
    border-color: rgba(167,139,250,0.4);
    background: rgba(167,139,250,0.1);
  }
  .burger-btn.open span { background: #c4b5fd; }
  .burger-btn.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
  .burger-btn.open span:nth-child(2) { opacity: 0; }
  .burger-btn.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
  .burger-btn.has-filter::after {
    content: '';
    position: absolute;
    top: 6px;
    right: 6px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #c084fc;
    box-shadow: 0 0 8px rgba(192,132,252,0.6);
  }

  /* === SEARCH === */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    opacity: 0.6;
  }

  .search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px 14px 46px;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: all 0.3s ease;
  }

  .search::placeholder { color: var(--text-muted); font-weight: 300; }
  .search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px var(--accent-dim);
    background: rgba(255,255,255,0.06);
  }

  /* === FILTERS (burger dropdown) === */
  .filters {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 0;
    overflow: hidden;
    padding: 0;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .filters.open {
    max-height: 320px;
    padding: 4px 0 14px;
  }

  .filter-btn {
    width: 100%;
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
  }

  .filter-btn:active { transform: scale(0.95); }

  .filter-btn.active {
    background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(192,132,252,0.15));
    color: #c4b5fd;
    border-color: rgba(167,139,250,0.35);
    box-shadow: 0 0 16px rgba(167,139,250,0.1);
    font-weight: 600;
  }

  .filter-btn .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
  }

  .filter-btn .dot.creator-dot { background: var(--creator); }
  .filter-btn .dot.testphase-dot { background: var(--testphase); }
  .filter-btn .dot.note-dot { background: #fbbf24; }

  /* === LIST === */
  .list {
    padding: 12px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  /* === CARD === */
  .card {
    background: rgba(22, 21, 40, 0.65);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    transition: all 0.2s ease;
    animation: cardIn 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(167,139,250,0.2), transparent);
  }

  .card:active {
    transform: scale(0.985);
    background: rgba(22, 21, 40, 0.8);
    border-color: rgba(167,139,250,0.2);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* === CARD LAYOUT === */
  .card { padding-left: 0; display: flex; gap: 0; }

  .status-rail {
    width: 4px;
    flex-shrink: 0;
    border-radius: 20px 0 0 20px;
    background: linear-gradient(180deg, #7c3aed, #a78bfa);
  }

  .card[data-status="testphase"] .status-rail {
    background: linear-gradient(180deg, #d97706, #f0a674);
  }

  .card-body { flex: 1; min-width: 0; padding: 16px 16px 16px 14px; }

  .card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
    letter-spacing: 0.01em;
  }

  .card-handle {
    font-size: 12.5px;
    font-weight: 400;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status-badge {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 5px 10px;
    border-radius: 100px;
    border: 1px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s ease, transform 0.1s ease;
    background: none;
    font-family: inherit;
  }
  .status-badge:active { transform: scale(0.92); }
  .status-badge.saving { opacity: 0.5; cursor: wait; }

  .status-badge.creator {
    background: rgba(167, 139, 250, 0.12);
    color: #c4b5fd;
    border-color: rgba(167, 139, 250, 0.2);
  }

  .status-badge.testphase {
    background: rgba(240, 166, 116, 0.12);
    color: var(--testphase);
    border-color: rgba(240, 166, 116, 0.2);
  }

  /* === PROGRESS CHIP (testphase videos done) === */
  .progress-chip {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    padding: 4px 9px;
    border-radius: 100px;
    background: rgba(240, 166, 116, 0.14);
    color: var(--testphase);
    border: 1px solid rgba(240, 166, 116, 0.28);
  }
  .progress-chip.complete {
    background: rgba(34, 197, 94, 0.14);
    color: #86efac;
    border-color: rgba(34, 197, 94, 0.4);
    animation: pulse-ring 2s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.35); }
    50%      { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
  }

  /* === CONFIRM DIALOG === */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 9, 17, 0.7);
    backdrop-filter: blur(12px);
    display: none;
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 360px;
    width: 100%;
    padding: 24px 22px 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .confirm-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin: 0 0 6px;
  }
  .confirm-body {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.45;
    margin: 0 0 14px;
  }
  .confirm-body strong { color: var(--text); font-weight: 600; }
  .confirm-warning {
    background: rgba(251, 191, 36, 0.1);
    border: 1px solid rgba(251, 191, 36, 0.25);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #fbbf24;
    margin: 0 0 14px;
    line-height: 1.4;
  }
  .confirm-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .confirm-btn {
    flex: 1;
    padding: 12px 10px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s ease;
  }
  .confirm-btn:active { transform: scale(0.96); }
  .confirm-btn.primary {
    background: linear-gradient(135deg, #a78bfa, #c084fc);
    color: #fff;
    border-color: transparent;
    font-weight: 600;
  }

  /* === ACTIONS === */
  .actions { display: flex; gap: 8px; }

  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 11px 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
    color: var(--text-muted);
    background: rgba(255,255,255,0.03);
  }

  .action-btn:active { transform: scale(0.95); }
  .action-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* TikTok = PRIMARY */
  .action-btn.tiktok-main {
    flex: 1.6;
    background: linear-gradient(135deg, rgba(255,0,79,0.12), rgba(255,107,157,0.08));
    border-color: rgba(255,0,79,0.25);
    color: #ff6b9d;
    font-weight: 600;
  }

  .action-btn.tiktok-main:active {
    background: linear-gradient(135deg, rgba(255,0,79,0.2), rgba(255,107,157,0.15));
    box-shadow: 0 0 20px rgba(255,0,79,0.15);
  }

  .action-btn.tiktok-main svg { width: 17px; height: 17px; }

  /* WhatsApp = secondary icon */
  .action-btn.whatsapp {
    width: 44px;
    flex-shrink: 0;
    flex-grow: 0;
    background: rgba(37, 211, 102, 0.06);
    border-color: rgba(37, 211, 102, 0.18);
    color: #4ade80;
  }

  .action-btn.whatsapp:active {
    background: rgba(37, 211, 102, 0.12);
  }

  .action-btn.no-tiktok {
    flex: 1;
    opacity: 0.25;
    pointer-events: none;
  }

  .action-btn.disabled { width: 44px; flex-shrink: 0; flex-grow: 0; opacity: 0.2; pointer-events: none; }

  /* Second platform icon */
  .social-link {
    width: 44px;
    flex-shrink: 0;
    flex-grow: 0;
    height: auto;
    padding: 11px 0;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    transition: all 0.2s ease;
  }

  .social-link:active { transform: scale(0.9); }
  .social-link svg { width: 16px; height: 16px; }

  .social-link.instagram { color: #e879a8; border-color: rgba(232,121,168,0.18); }
  .social-link.youtube { color: #f87171; border-color: rgba(248,113,113,0.18); }
  .social-link.pinterest { color: #fb7185; border-color: rgba(251,113,133,0.18); }
  .social-link.snapchat { color: #fde047; border-color: rgba(253,224,71,0.18); }

  /* === NOTES === */
  .note-toggle {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    border: none;
    background: none;
    color: var(--text-muted);
    opacity: 0.35;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    transition: all 0.2s ease;
    padding: 0;
  }

  .note-toggle:active { transform: scale(0.9); }
  .note-toggle svg { width: 16px; height: 16px; }

  .note-toggle.has-note {
    opacity: 1;
    color: #fbbf24;
  }

  .note-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }

  .note-overlay.open {
    opacity: 1;
    visibility: visible;
  }

  .note-modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: calc(100% - 48px);
    max-width: 400px;
    padding: 20px;
    position: relative;
    transform: translateY(16px) scale(0.97);
    transition: transform 0.25s ease;
  }

  .note-overlay.open .note-modal {
    transform: translateY(0) scale(1);
  }

  .note-modal-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
    padding-right: 28px;
  }

  .note-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
    transition: all 0.15s ease;
    padding: 0;
  }

  .note-close:hover, .note-close:active {
    background: rgba(255,255,255,0.12);
    color: var(--text);
  }

  .note-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    font-family: inherit;
    outline: none;
    resize: none;
    height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .note-input::placeholder { color: var(--text-muted); font-weight: 300; }
  .note-input:focus {
    border-color: rgba(251, 191, 36, 0.4);
  }

  /* === STATES === */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
  .empty-text { font-size: 15px; line-height: 1.5; font-weight: 300; }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2.5px solid rgba(167,139,250,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 13px; font-weight: 300; }

  /* === SCROLL TOP === */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(124, 58, 237, 0.35);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 50;
  }

  .scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .scroll-top:active { transform: scale(0.9); }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">Creator<span>Hub</span></div>
    <div class="header-right">
      <div class="counter" id="counter">...</div>
      <button class="burger-btn" id="burgerBtn" aria-label="Filter" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="search" type="search" id="search" placeholder="Creator suchen..." autocomplete="off">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="creator"><span class="dot creator-dot"></span>Creator</button>
    <button class="filter-btn" data-filter="testphase"><span class="dot testphase-dot"></span>Testphase</button>
    <button class="filter-btn" data-filter="notes"><span class="dot note-dot"></span>Mit Notiz</button>
  </div>
</header>

<main class="list" id="list"></main>

<button class="scroll-top" id="scrollTop">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-modal">
    <h3 class="confirm-title" id="confirmTitle">Status ändern?</h3>
    <p class="confirm-body" id="confirmBody"></p>
    <div class="confirm-warning" id="confirmWarning" style="display:none;"></div>
    <div class="confirm-actions">
      <button class="confirm-btn" id="confirmCancel">Abbrechen</button>
      <button class="confirm-btn primary" id="confirmPrimary">Umstellen</button>
    </div>
  </div>
</div>

<div class="note-overlay" id="noteOverlay">
  <div class="note-modal">
    <div class="note-modal-title" id="noteModalTitle"></div>
    <button class="note-close" id="noteClose">&times;</button>
    <textarea class="note-input" id="noteModalInput" placeholder="Notiz hinzufugen..."></textarea>
  </div>
</div>

<script>
const API = 'https://primary-production-fd8f.up.railway.app/webhook/creators';
const STATUS_API = 'https://primary-production-fd8f.up.railway.app/webhook/creators/status';
const HUB_TOKEN = 'd8a10530725a5ca3dd12fbcadc5b2df90982df0cfb6ec33b';
let allCreators = [];
let activeFilter = 'all';

function updateStatusOnServer(tiktokLink, newStatus) {
  return fetch(STATUS_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Hub-Token': HUB_TOKEN },
    body: JSON.stringify({ tiktokLink: tiktokLink, status: newStatus })
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

function showConfirmDialog(opts) {
  var overlay = document.getElementById('confirmOverlay');
  document.getElementById('confirmTitle').textContent = opts.title;

  var bodyEl = document.getElementById('confirmBody');
  bodyEl.textContent = '';
  var nameSpan = document.createElement('strong');
  nameSpan.textContent = opts.creatorName;
  bodyEl.appendChild(nameSpan);
  bodyEl.appendChild(document.createElement('br'));
  bodyEl.appendChild(document.createTextNode(opts.arrow));

  var warnEl = document.getElementById('confirmWarning');
  if (opts.warning) {
    warnEl.textContent = opts.warning;
    warnEl.style.display = 'block';
  } else {
    warnEl.style.display = 'none';
  }
  document.getElementById('confirmPrimary').textContent = opts.primaryLabel || 'Umstellen';
  overlay.classList.add('open');

  var primaryBtn = document.getElementById('confirmPrimary');
  var cancelBtn = document.getElementById('confirmCancel');
  function cleanup() {
    overlay.classList.remove('open');
    primaryBtn.removeEventListener('click', onYes);
    cancelBtn.removeEventListener('click', onNo);
    overlay.removeEventListener('click', onBackdrop);
  }
  function onYes() { cleanup(); opts.onConfirm && opts.onConfirm(); }
  function onNo() { cleanup(); }
  function onBackdrop(e) { if (e.target === overlay) cleanup(); }
  primaryBtn.addEventListener('click', onYes);
  cancelBtn.addEventListener('click', onNo);
  overlay.addEventListener('click', onBackdrop);
}

function formatGermanDate(val) {
  if (!val) return '';
  var s = String(val).trim();
  if (/^\d{2}:\d{2}\s*-\s*\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;
  var d = new Date(s);
  if (isNaN(d)) return s;
  var parts = new Intl.DateTimeFormat('de-DE', {
    timeZone: 'Europe/Berlin',
    hour: '2-digit', minute: '2-digit',
    day: '2-digit', month: '2-digit', year: 'numeric'
  }).formatToParts(d);
  var p = {};
  parts.forEach(function(x) { p[x.type] = x.value; });
  return p.hour + ':' + p.minute + ' - ' + p.day + '.' + p.month + '.' + p.year;
}

function applyStatusChange(creator, badge, card, newStatus) {
  if (badge.classList.contains('saving')) return;
  var oldStatus = creator.status;

  creator.status = newStatus;
  creator.videosDone = null;
  creator.baseline = null;
  card.dataset.status = newStatus;
  badge.className = 'status-badge ' + newStatus + ' saving';
  badge.textContent = newStatus === 'testphase' ? 'Test' : 'Active';

  var existingChip = card.querySelector('.progress-chip');
  if (existingChip) existingChip.remove();

  updateStatusOnServer(creator.tiktok, newStatus)
    .then(function() {
      badge.classList.remove('saving');
    })
    .catch(function(err) {
      creator.status = oldStatus;
      card.dataset.status = oldStatus;
      badge.className = 'status-badge ' + oldStatus;
      badge.textContent = oldStatus === 'testphase' ? 'Test' : 'Active';
      alert('Status konnte nicht gespeichert werden. ' + err.message);
    });
}

function handleStatusToggle(creator, badge, card) {
  var oldStatus = creator.status;
  var newStatus = oldStatus === 'testphase' ? 'creator' : 'testphase';
  var arrow = (oldStatus === 'testphase' ? 'Testphase' : 'Creator') + ' → ' +
              (newStatus === 'testphase' ? 'Testphase' : 'Creator');

  var warning = null;
  if (newStatus === 'testphase' && creator.completedAt) {
    warning = 'Hatte Testphase am ' + formatGermanDate(creator.completedAt) +
              ' bereits abgeschlossen. Zähler wird neu gestartet.';
  }

  showConfirmDialog({
    title: 'Status ändern?',
    creatorName: creator.name,
    arrow: arrow,
    warning: warning,
    primaryLabel: 'Umstellen',
    onConfirm: function() { applyStatusChange(creator, badge, card, newStatus); }
  });
}

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'class') node.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
      else if (k.startsWith('data-')) node.setAttribute(k, v);
      else node[k] = v;
    });
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (!c) return;
      if (typeof c === 'string') node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    });
  }
  return node;
}

function svgIcon(svgMarkup) {
  const t = document.createElement('template');
  t.innerHTML = svgMarkup.trim();
  return t.content.firstChild;
}

  pinterest: () => svgIcon('<svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17"><path d="M12 0C5.373 0 0 5.372 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 01.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.631-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12 0-6.628-5.373-12-12-12z"/></svg>'),
  snapchat: () => svgIcon('<svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17"><path d="M12.206.793c.99 0 4.347.276 5.93 3.821.529 1.193.403 3.219.299 4.847l-.003.06c-.012.18-.022.345-.03.51.075.045.203.09.401.09.3-.016.659-.12.959-.289.219-.125.477-.185.684-.185.378 0 .665.211.715.49.039.226-.069.58-.719.885-.6.28-1.41.46-1.75.585l-.035.015c-.12.045-.18.075-.21.135-.045.09-.03.21.015.36a14.7 14.7 0 001.096 2.204c.48.72 1.233 1.545 2.174 2.01.21.105.345.24.345.39 0 .345-.795.63-1.846.795-.18.029-.18.029-.39.584-.09.24-.195.465-.315.585-.255.24-.615.24-.989.24-.33 0-.689-.03-1.11-.09a3.497 3.497 0 00-.57-.045 4.31 4.31 0 00-.765.071c-.57.12-1.17.495-1.905.9-.96.525-2.04 1.02-3.239 1.02-.06 0-.12 0-.195-.015h-.045c-1.17 0-2.235-.48-3.18-.99-.72-.39-1.305-.75-1.875-.87a4.826 4.826 0 00-.78-.075c-.255 0-.51.03-.72.06-.42.06-.81.09-1.125.09-.39 0-.735 0-.975-.24a2.77 2.77 0 01-.33-.6c-.195-.51-.21-.54-.39-.57-1.05-.166-1.83-.45-1.83-.795 0-.15.135-.285.345-.39.93-.465 1.695-1.29 2.175-2.01.36-.54.72-1.245 1.095-2.205.045-.15.06-.27.015-.36-.03-.06-.09-.09-.21-.135l-.039-.016c-.33-.12-1.14-.3-1.74-.585-.495-.225-.853-.57-.72-.885.075-.33.42-.49.72-.49.18 0 .42.06.63.18.319.18.659.289.959.289.195 0 .315-.045.39-.09-.007-.165-.019-.33-.03-.51l-.002-.06c-.105-1.628-.23-3.654.3-4.846C4.94 1.076 8.297.793 9.286.793h.015c.93 0 1.95.06 2.905.06z"/></svg>'),

};

// --- Notes localStorage ---
function getNotes() {
  try { return JSON.parse(localStorage.getItem('creatorNotes') || '{}'); } catch(e) { return {}; }
}

function saveNote(handle, text) {
  var notes = getNotes();
  if (text.trim()) { notes[handle] = text; } else { delete notes[handle]; }
  localStorage.setItem('creatorNotes', JSON.stringify(notes));
}

var _noteModalTimer;
var _noteModalHandle = null;
var _noteModalBtn = null;

function openNoteModal(handle, name, btn) {
  var overlay = document.getElementById('noteOverlay');
  var input = document.getElementById('noteModalInput');
  var title = document.getElementById('noteModalTitle');
  _noteModalHandle = handle;
  _noteModalBtn = btn;
  title.textContent = 'Notiz — ' + name;
  input.value = getNotes()[handle] || '';
  overlay.classList.add('open');
  setTimeout(function() { input.focus(); }, 120);
}

function closeNoteModal() {
  var overlay = document.getElementById('noteOverlay');
  overlay.classList.remove('open');
  _noteModalHandle = null;
  _noteModalBtn = null;
}

// Wire up modal close + auto-save
document.addEventListener('DOMContentLoaded', function() {
  var overlay = document.getElementById('noteOverlay');
  var closeBtn = document.getElementById('noteClose');
  var input = document.getElementById('noteModalInput');

  closeBtn.addEventListener('click', closeNoteModal);

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeNoteModal();
  });

  input.addEventListener('input', function() {
    clearTimeout(_noteModalTimer);
    _noteModalTimer = setTimeout(function() {
      if (!_noteModalHandle) return;
      saveNote(_noteModalHandle, input.value);
      if (_noteModalBtn) {
        var filled = !!(input.value.trim());
        _noteModalBtn.className = 'note-toggle' + (filled ? ' has-note' : '');
        _noteModalBtn.textContent = '';
        _noteModalBtn.appendChild(filled ? SVG.noteFilled() : SVG.noteEmpty());
      }
    }, 500);
  });
});

function buildCard(c, i) {
  const card = el('div', { class: 'card', 'data-status': c.status });
  card.style.animationDelay = (i * 0.04) + 's';

  // Status rail (colored left border)
  const rail = el('div', { class: 'status-rail' });

  // Card body
  const body = el('div', { class: 'card-body' });

  // Top row: name + badge
  const nameEl = el('div', { class: 'card-name' }, c.name);
  const handleEl = el('div', { class: 'card-handle' }, '@' + c.handle);
  const info = el('div', { class: 'card-info' }, [nameEl, handleEl]);
  const badge = el('button', { class: 'status-badge ' + c.status, title: 'Tippen zum Umschalten' }, c.status === 'testphase' ? 'Test' : 'Active');
  badge.addEventListener('click', function(e) {
    e.stopPropagation();
    handleStatusToggle(c, badge, card);
  });

  let progressChip = null;
  if (c.status === 'testphase' && typeof c.videosDone === 'number') {
    var done = c.videosDone;
    var required = c.videosRequired || 5;
    var complete = done >= required;
    progressChip = el('span', {
      class: 'progress-chip' + (complete ? ' complete' : ''),
      title: done + ' von ' + required + ' Testphase-Videos abgegeben'
    }, complete ? '★ ' + done + '/' + required : 'Test ' + done + '/' + required);
  }

  // Note toggle button
  var notes = getNotes();
  var hasNote = !!(notes[c.handle] && notes[c.handle].trim());
  var noteBtn = el('button', { class: 'note-toggle' + (hasNote ? ' has-note' : '') }, [hasNote ? SVG.noteFilled() : SVG.noteEmpty()]);

  const topChildren = [info, noteBtn];
  if (progressChip) topChildren.push(progressChip);
  topChildren.push(badge);
  const top = el('div', { class: 'card-top' }, topChildren);

  // Actions: TikTok (primary) + WhatsApp (icon) + 2nd platform (icon)
  const actions = el('div', { class: 'actions' });

  // TikTok = hero button
  if (c.tiktok) {
    actions.appendChild(el('a', { href: c.tiktok, target: '_blank', class: 'action-btn tiktok-main' }, [SVG.tiktok(), document.createTextNode('TikTok')]));
  } else {
    actions.appendChild(el('span', { class: 'action-btn no-tiktok' }, [SVG.tiktok(), document.createTextNode('TikTok')]));
  }

  // WhatsApp = compact icon
  if (c.phone) {
    actions.appendChild(el('a', { href: 'https://wa.me/' + c.phone, target: '_blank', class: 'action-btn whatsapp' }, [SVG.whatsapp()]));
  } else {
    actions.appendChild(el('span', { class: 'action-btn disabled' }, [SVG.phone()]));
  }

  // Second platform = compact icon
  if (c.secType && c.secUrl && SVG[c.secType]) {
    actions.appendChild(el('a', { href: c.secUrl, target: '_blank', class: 'social-link ' + c.secType }, [SVG[c.secType]()]));
  }

  // Open note modal on button click
  noteBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    openNoteModal(c.handle, c.name, noteBtn);
  });

  body.appendChild(top);
  body.appendChild(actions);
  card.appendChild(rail);
  card.appendChild(body);
  return card;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = allCreators;

  if (activeFilter === 'notes') {
    var notes = getNotes();
    filtered = filtered.filter(c => notes[c.handle] && notes[c.handle].trim());
  } else if (activeFilter !== 'all') {
    filtered = filtered.filter(c => c.status === activeFilter);
  }
  if (q) {
    filtered = filtered.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.handle.toLowerCase().includes(q)
    );
  }

  const list = document.getElementById('list');
  list.textContent = '';

  if (filtered.length === 0) {
    list.appendChild(el('div', { class: 'empty' }, [
      el('div', { class: 'empty-icon' }, ':/'),
      el('div', { class: 'empty-text' }, 'Keine Creator gefunden')
    ]));
  } else {
    filtered.forEach((c, i) => list.appendChild(buildCard(c, i)));
  }

  const total = allCreators.length;
  const shown = filtered.length;
  const counter = document.getElementById('counter');
  counter.textContent = '';
  const b = el('b', {}, String(shown === total ? total : shown));
  counter.appendChild(b);
  counter.appendChild(document.createTextNode(shown === total ? ' Creator' : ' / ' + total));
}

(function showLoading() {
  document.getElementById('list').appendChild(
    el('div', { class: 'loading' }, [
      el('div', { class: 'spinner' }),
      el('div', { class: 'loading-text' }, 'Creator laden...')
    ])
  );
})();

function closeBurger() {
  document.getElementById('filters').classList.remove('open');
  var bb = document.getElementById('burgerBtn');
  bb.classList.remove('open');
  bb.setAttribute('aria-expanded', 'false');
}

function updateBurgerIndicator() {
  var bb = document.getElementById('burgerBtn');
  if (activeFilter && activeFilter !== 'all') bb.classList.add('has-filter');
  else bb.classList.remove('has-filter');
}

document.getElementById('burgerBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  var filters = document.getElementById('filters');
  var opened = filters.classList.toggle('open');
  this.classList.toggle('open', opened);
  this.setAttribute('aria-expanded', opened ? 'true' : 'false');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.header')) closeBurger();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeBurger();
});

document.getElementById('filters').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  updateBurgerIndicator();
  closeBurger();
  render();
});

var searchTimer;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 150);
});

document.getElementById('scrollTop').addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Header auto-hide on scroll
var lastScrollY = 0;
var headerEl = document.querySelector('.header');
var searchEl = document.getElementById('search');

window.addEventListener('scroll', function() {
  var sy = window.scrollY;
  document.getElementById('scrollTop').classList.toggle('visible', sy > 400);

  // Don't hide header if search is focused
  if (document.activeElement === searchEl) {
    lastScrollY = sy;
    return;
  }

  if (sy > lastScrollY && sy > 80) {
    headerEl.classList.add('hidden');
  } else if (sy < lastScrollY) {
    headerEl.classList.remove('hidden');
  }
  lastScrollY = sy;
}, { passive: true });

function normalizeUrl(url) {
  if (!url) return url;
  var u = String(url).trim();
  if (!u) return u;
  if (u.startsWith('http://') || u.startsWith('https://')) return u;
  return 'https://' + u.replace(/^\/+/, '');
}

fetch(API)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    allCreators = (data.creators || []).map(function(c) {
      c.tiktok = normalizeUrl(c.tiktok);
      c.secUrl = normalizeUrl(c.secUrl);
      return c;
    });
    allCreators.sort(function(a, b) { return a.name.localeCompare(b.name, 'de'); });
    render();
  })
  .catch(function() {
    var list = document.getElementById('list');
    list.textContent = '';
    list.appendChild(el('div', { class: 'empty' }, [
      el('div', { class: 'empty-icon' }, '!'),
      el('div', { class: 'empty-text' }, 'Fehler beim Laden. Bitte Seite neu laden.')
    ]));
  });
</script>
